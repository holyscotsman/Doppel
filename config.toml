thumb_size = 512
near_hamming_max = 8
dhash_confirm_max = 10
similar_cosine_min = 0.92
color_variant_min_delta = 0.25  # normalized HSV histogram distance; above = colorway
clip_model = "ViT-B-32/laion2b_s34b_b79k"
db_path = "doppel.db"
cache_dir = "cache"
drive_folder_id = ""  # empty = scan the entire Drive; set via /setup or paste a folder id
resume_overlap = 3    # after an interruption, re-check this many recent photos per stage

[ollama]
host = "http://127.0.0.1:11434"
model = "gemma3:27b"         # any pulled multi-image vision model
adjudicate_band_min = 0.85   # pairs in [this, similar_cosine_min) go to the VLM

# How hard to push the machine during the deeper scans. The fetch/hash/prefetch
# pools are network-I/O bound, so they default to 4x your CPU cores (capped at
# 32), NOT the core count — a worker mostly waits on an HTTPS round trip, so
# more of them means more throughput. Each worker has its own connection, so
# raising these is safe; lower them only if the Drive CDN starts rate-limiting
# you (the fetcher already backs off on 429). Uncomment to override.
[perf]
clip_batch = 64            # images per GPU pass when embedding; 64 suits 24GB+
# fetch_workers = 32       # parallel thumbnail downloads (network-I/O bound)
# hash_workers = 32        # parallel fetch + pHash/dHash in the near stage
# embed_fetch_workers = 32 # prefetch threads feeding the CLIP batcher
# db_batch = 100           # rows per sqlite transaction from the single writer
# adjudicate_workers = 3   # fetch + VLM threads (Ollama is one local server)
# queue_maxsize = 64       # bounded worker->writer handoff depth
