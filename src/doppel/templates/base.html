<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}doppel{% endblock %}</title>
  <script src="/static/htmx.min.js"></script>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0;
           background: #101216; color: #e8eaed; }
    a { color: #8ab4f8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    header { padding: 0.8rem 1.5rem; border-bottom: 1px solid #2a2e37;
             display: flex; gap: 1.5rem; align-items: baseline; }
    header h1 { font-size: 1.1rem; margin: 0; }
    header h1 a { color: #e8eaed; }
    main { padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
    .cards { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
    .card { background: #1a1e26; border: 1px solid #2a2e37; border-radius: 8px;
            padding: 1rem 1.4rem; min-width: 130px; }
    .card .big { font-size: 1.7rem; font-weight: 600; }
    .card .label { color: #9aa0a6; font-size: 0.85rem; }
    button { background: #8ab4f8; color: #101216; border: none; padding: 0.45rem 1rem;
             border-radius: 6px; font-size: 0.9rem; cursor: pointer; font-weight: 600; }
    button:disabled { background: #3a3f4a; color: #9aa0a6; cursor: default; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 0.5rem 0.8rem; border-bottom: 1px solid #2a2e37; }
    .muted { color: #9aa0a6; }
    .error { color: #f28b82; margin: 0.5rem 0; }
    .ok { color: #81c995; margin: 0.5rem 0; }
    .setup-step { background: #1a1e26; border: 1px solid #2a2e37; border-radius: 8px;
                  padding: 1rem 1.4rem; margin: 1rem 0; }
    .note { background: #14171d; border: 1px solid #2a2e37; border-left: 3px solid #8ab4f8;
            border-radius: 6px; padding: 0.7rem 1rem; margin: 0.7rem 0; font-size: 0.9rem;
            color: #9aa0a6; }
    .note strong { color: #e8eaed; }
    ul.help { margin: 0.5rem 0; padding-left: 1.2rem; }
    ul.help li { margin: 0.25rem 0; }
    .badge-todo { background: #b3261e; }
    .google-btn { background: #fff; color: #1f1f1f; font-weight: 600;
                  padding: 0.55rem 1.2rem; }
    .google-btn:hover { background: #f0f0f0; }
    .ghost-btn { background: transparent; color: #9aa0a6; border: 1px solid #3a3f4a; }
    .ghost-btn:hover { color: #e8eaed; border-color: #8ab4f8; }
    ol.wizard { list-style: none; counter-reset: wz; margin: 1rem 0; padding: 0;
                display: grid; gap: 0.7rem; }
    ol.wizard > li { counter-increment: wz; position: relative; background: #14171d;
                     border: 1px solid #2a2e37; border-radius: 8px;
                     padding: 0.9rem 1.1rem 0.9rem 3.2rem; }
    ol.wizard > li::before { content: counter(wz); position: absolute; left: 0.9rem;
                     top: 0.9rem; width: 1.7rem; height: 1.7rem; border-radius: 50%;
                     background: #8ab4f8; color: #0b0d11; font-weight: 700;
                     display: flex; align-items: center; justify-content: center; }
    .wz-head { font-weight: 600; margin-bottom: 0.2rem; }
    .wz-body { margin: 0 0 0.6rem; font-size: 0.9rem; color: #c8ccd2; }
    .wz-body b { color: #fff; }
    a.wz-link { display: inline-block; background: #8ab4f8; color: #0b0d11;
                font-weight: 600; font-size: 0.85rem; padding: 0.35rem 0.9rem;
                border-radius: 6px; }
    a.wz-link:hover { background: #a5c6fb; text-decoration: none; }
    .pillnum { display: inline-block; min-width: 1.1rem; text-align: center;
               background: #8ab4f8; color: #0b0d11; border-radius: 50%;
               font-size: 0.75rem; font-weight: 700; padding: 0 0.15rem; }
    .browser { border: 1px solid #2a2e37; border-radius: 8px; padding: 0.8rem 1rem;
               background: #14171d; }
    .crumbs { margin-bottom: 0.7rem; font-size: 0.9rem; }
    .crumbs .sep { color: #5a6069; margin: 0 0.3rem; }
    .crumbs a.crumb { cursor: pointer; }
    .scan-here { margin-bottom: 0.8rem; align-items: center; }
    ul.folders { list-style: none; margin: 0; padding: 0; max-height: 260px;
                 overflow-y: auto; }
    ul.folders li { padding: 0.35rem 0.2rem; border-top: 1px solid #22262e; }
    ul.folders li a.folder { cursor: pointer; display: block; }
    ul.folders li a.folder:hover { color: #a5c6fb; text-decoration: none; }
    li.folder-row { display: flex; align-items: center; justify-content: space-between;
                    gap: 0.6rem; }
    li.folder-row a.folder { flex: 1; }
    .folder-scan { margin: 0; }
    .mini-btn { background: #22262e; color: #c8ccd2; border: 1px solid #3a3f4a;
                padding: 0.22rem 0.7rem; font-size: 0.78rem; font-weight: 500;
                border-radius: 6px; white-space: nowrap; }
    .mini-btn:hover { background: #2c313b; color: #fff; border-color: #8ab4f8; }
    .mini-btn-on { background: #2e7d32; color: #fff; border-color: #2e7d32; }
    .browse-hint { margin: 0.3rem 0 0.5rem; font-size: 0.82rem; }
    .banner { background: #2a2312; border: 1px solid #5c4a1a; border-radius: 8px;
              padding: 0.7rem 1.2rem; margin: 1rem 0; }
    select, input[type="text"] { background: #101216; color: #e8eaed;
              border: 1px solid #2a2e37; border-radius: 6px; padding: 0.4rem 0.6rem; }
    .badge { background: #5f3dc4; color: #fff; border-radius: 4px; padding: 0.1rem 0.45rem;
             font-size: 0.75rem; }
    .badge-ok { background: #2e7d32; }
    .decision { margin: 0.6rem 0 0.2rem; display: flex; gap: 1.2rem; }
    .decision label { cursor: pointer; }
    .thumb { width: 96px; height: 96px; object-fit: cover; border-radius: 6px;
             background: #2a2e37; }
    .thumb-lg { width: 320px; height: 320px; object-fit: contain; border-radius: 6px;
                background: #2a2e37; }
    .strip { display: flex; gap: 0.4rem; }
    .members { display: flex; gap: 1.2rem; flex-wrap: wrap; }
    .member { background: #1a1e26; border: 1px solid #2a2e37; border-radius: 8px;
              padding: 1rem; width: 340px; }
    .member dl { margin: 0.7rem 0 0; font-size: 0.85rem; }
    .member dt { color: #9aa0a6; float: left; clear: left; width: 7.5rem; }
    .member dd { margin: 0 0 0.2rem 7.8rem; overflow-wrap: anywhere; }
    .progress { background: #2a2e37; border-radius: 4px; height: 8px; width: 220px;
                overflow: hidden; }
    .progress > div { background: #8ab4f8; height: 100%; transition: width 0.4s ease; }
    /* concentric scan progress rings: sync innermost, adjudicate outermost */
    .scan-viz { display: flex; gap: 2.2rem; align-items: center; flex-wrap: wrap;
                margin: 1.3rem 0 1.2rem; }
    .concentric { position: relative; width: 224px; height: 224px; flex: none;
                  filter: drop-shadow(0 6px 16px rgba(0,0,0,0.45)); }
    .cring-svg { width: 100%; height: 100%; overflow: visible; }
    .cring-track { fill: none; stroke: #23272f; stroke-width: 11; }
    .cring-fill { fill: none; stroke-width: 11; stroke-linecap: round;
                  transition: stroke-dashoffset 0.7s ease; }
    .cring-spin { fill: none; stroke-width: 11; stroke-linecap: round; }
    .cring--running { stroke: #8ab4f8;
                      filter: drop-shadow(0 0 4px rgba(138,180,248,0.7)); }
    .cring--done { stroke: #34d399; }
    .cring--failed { stroke: #f28b82; }
    .cring--idle { stroke: #333842; }
    .cring-center { position: absolute; inset: 0; display: flex;
                    flex-direction: column; align-items: center; justify-content: center;
                    gap: 0.15rem; pointer-events: none; }
    .cc-num { font-size: 2rem; font-weight: 700; color: #e8eaed; line-height: 1; }
    .cc-unit { font-size: 0.9rem; font-weight: 600; color: #9aa0a6; }
    .cc-cap { font-size: 0.72rem; color: #9aa0a6; text-transform: uppercase;
              letter-spacing: 0.04em; }
    .cc-done { color: #34d399; }
    .cc-fail { color: #f28b82; }
    .cc-dots { color: #8ab4f8; letter-spacing: 1px; font-size: 1.3rem;
               animation: pulse 1.1s ease-in-out infinite; }
    /* legend: one row per ring, inner (top) to outer (bottom) */
    .stage-legend { list-style: none; margin: 0; padding: 0; flex: 1; min-width: 260px;
                    counter-reset: ring; border-top: 1px solid #22262e; }
    .legend-row { display: flex; align-items: center; gap: 0.8rem;
                  padding: 0.5rem 0.3rem; border-bottom: 1px solid #22262e; }
    .legend-dot { width: 0.85rem; height: 0.85rem; border-radius: 50%; flex: none;
                  box-shadow: 0 0 0 3px #1a1e26, 0 0 0 4px #2a2e37; }
    .legend--running { background: #8ab4f8; }
    .legend--done { background: #34d399; }
    .legend--failed { background: #f28b82; }
    .legend--idle { background: #333842; }
    .legend-main { flex: 1; display: flex; flex-direction: column; gap: 0.1rem; }
    .legend-status { display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap;
                     font-size: 0.85rem; }
    .legend-status .timing { font-size: 0.78rem; }
    @media (prefers-reduced-motion: reduce) {
      .cring-spin animateTransform { display: none; }
    }
    .scan-controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
                     margin-bottom: 1rem; }
    .scan-all-btn { background: #8ab4f8; color: #0b0d11; font-weight: 700;
                    font-size: 1rem; padding: 0.6rem 1.4rem; border-radius: 8px; }
    .scan-all-btn:hover:not(:disabled) { background: #a5c6fb; }
    .scan-all-btn:disabled { background: #3a3f4a; color: #9aa0a6; }
    table.scan-table td { border-bottom: 1px solid #22262e; padding: 0.5rem 0.8rem; }
    .scan-controls { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
                     margin-bottom: 1rem; }
    .scan-all-btn { background: #8ab4f8; color: #0b0d11; font-weight: 700;
                    font-size: 1rem; padding: 0.6rem 1.4rem; border-radius: 8px; }
    .scan-all-btn:hover:not(:disabled) { background: #a5c6fb; }
    .scan-all-btn:disabled { background: #3a3f4a; color: #9aa0a6; }
    table.scan-table td { border-bottom: 1px solid #22262e; padding: 0.5rem 0.8rem; }
    tr.live-row { background: #1a2230; }
    .stage-label { font-weight: 500; }
    .ok-tick { color: #81c995; }
    .dot-live { display: inline-block; width: 0.55rem; height: 0.55rem; border-radius: 50%;
                background: #8ab4f8; animation: pulse 1.1s ease-in-out infinite; }
    .timing { display: block; font-size: 0.78rem; margin-top: 0.2rem; }
    .daily-scan { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap;
                  margin: 0.3rem 0 1rem; font-size: 0.9rem; }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
    .pager { margin-top: 1rem; display: flex; gap: 1rem; }
    /* one-page review */
    .review-tabs { display: flex; gap: 0.4rem; margin: 0.5rem 0 1rem; }
    .review-tabs a { padding: 0.35rem 0.9rem; border: 1px solid #2a2e37; border-radius: 999px;
                     color: #9aa0a6; font-size: 0.9rem; }
    .review-tabs a:hover { color: #e8eaed; text-decoration: none; }
    .review-tabs a.on { background: #8ab4f8; color: #0b0d11; border-color: #8ab4f8; font-weight: 600; }
    .review-bar { display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap;
                  padding: 0.7rem 1rem; background: #1a1e26; border: 1px solid #2a2e37;
                  border-radius: 8px; margin-bottom: 1.2rem; font-size: 0.9rem; }
    .review-bar .reclaim { color: #81c995; font-weight: 600; }
    .review-filter a { margin: 0 0.35rem; }
    .review-group { background: #1a1e26; border: 1px solid #2a2e37; border-radius: 10px;
                    padding: 1rem 1.2rem; margin-bottom: 1rem; }
    .review-group.reviewed { border-color: #2e7d3255; }
    .rg-head { display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.6rem; }
    .rg-title { font-weight: 600; }
    .rg-actions { margin-left: auto; display: flex; align-items: center; gap: 0.8rem; }
    .rg-verdicts { font-size: 0.85rem; margin-bottom: 0.6rem; }
    .rg-members { display: flex; gap: 1rem; flex-wrap: wrap; }
    .rg-photo { width: 220px; border: 2px solid transparent; border-radius: 8px; padding: 0.5rem;
                background: #14171d; }
    .rg-photo.keep { border-color: #2e7d32; }
    .rg-photo.trash { border-color: #5c2b2b; opacity: 0.72; }
    .rg-photo .thumb-lg { width: 100%; height: 200px; object-fit: contain; background: #2a2e37; }
    .rg-name { font-size: 0.85rem; overflow-wrap: anywhere; margin-top: 0.4rem; }
    .rg-path { font-size: 0.76rem; color: #7f8590; margin-top: 0.25rem;
               overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rg-choice { display: flex; gap: 0.9rem; margin-top: 0.5rem; font-size: 0.9rem; }
    .rg-choice label { cursor: pointer; }
    .load-more { padding: 1rem; text-align: center; }
    .conf-badge { background: #2e7d32; }
    /* move-to-trash confirm / result */
    .note.reassure { border-left-color: #34d399; }
    .trash-list { list-style: none; margin: 1rem 0; padding: 0; max-width: 640px;
                  max-height: 420px; overflow-y: auto; }
    .trash-row { display: flex; gap: 0.9rem; align-items: center;
                 padding: 0.5rem 0.2rem; border-bottom: 1px solid #22262e; }
    .trash-meta { min-width: 0; }
    .trash-name { font-size: 0.9rem; overflow-wrap: anywhere; }
    .trash-actions { display: flex; align-items: center; gap: 1.2rem;
                     margin-top: 1.2rem; flex-wrap: wrap; }
    .danger-btn { background: #d93838; color: #fff; font-weight: 700;
                  font-size: 1rem; padding: 0.6rem 1.4rem; border-radius: 8px; }
    .danger-btn:hover:not(:disabled) { background: #e85050; }
    .danger-btn:disabled { background: #5c2b2b; color: #d7b3b3; }
    .ghost-btn-link { color: #9aa0a6; border: 1px solid #3a3f4a; border-radius: 6px;
                      padding: 0.5rem 1rem; }
    .ghost-btn-link:hover { color: #e8eaed; border-color: #8ab4f8;
                            text-decoration: none; }
    .settings-form { display: flex; flex-direction: column; gap: 0.9rem; align-items: flex-start; }
    .radio-row { display: flex; gap: 0.6rem; align-items: flex-start; font-size: 0.92rem;
                 max-width: 640px; cursor: pointer; }
    .radio-row input { margin-top: 0.25rem; }
  </style>
</head>
<body>
<header>
  <h1><a href="/">doppel</a></h1>
  <nav>
    <a href="/">dashboard</a>
    <a href="/review?tier=exact">review</a>
    <a href="/export">export CSV</a>
    <a href="/settings">settings</a>
    <a href="/setup">setup</a>
  </nav>
</header>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
